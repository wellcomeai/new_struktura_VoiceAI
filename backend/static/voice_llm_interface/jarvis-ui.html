<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Voicyfy</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after {
  box-sizing: border-box;
  margin: 0;
  padding: 0;
}

body {
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
  background: #ffffff;
  color: #1a1a1a;
  height: 100vh;
  overflow: hidden;
  display: flex;
  flex-direction: column;
  align-items: center;
}

/* Header */
.header {
  width: 100%;
  text-align: center;
  padding: 16px 0 8px;
  flex-shrink: 0;
}

.header h1 {
  font-family: 'Share Tech Mono', monospace;
  font-size: 13px;
  font-weight: 400;
  color: #b0b0b0;
  letter-spacing: 6px;
}

/* Main area */
.main-area {
  flex: 1;
  width: 100%;
  display: flex;
  justify-content: center;
  align-items: center;
  padding: 0 24px 100px;
  min-height: 0;
}

/* Output box */
.output-box {
  width: 70%;
  max-width: 900px;
  height: 65vh;
  background: #ffffff;
  border: 1px solid #e5e5e5;
  border-radius: 16px;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.06);
  overflow-y: auto;
  padding: 20px 24px;
  scroll-behavior: smooth;
}

.output-box::-webkit-scrollbar {
  width: 6px;
}

.output-box::-webkit-scrollbar-track {
  background: transparent;
}

.output-box::-webkit-scrollbar-thumb {
  background: #d0d0d0;
  border-radius: 3px;
}

.output-box::-webkit-scrollbar-thumb:hover {
  background: #b0b0b0;
}

/* Message lines */
.message-line {
  margin-bottom: 6px;
  line-height: 1.5;
  display: flex;
  align-items: baseline;
  gap: 8px;
}

.message-line .timestamp {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  color: #999999;
  flex-shrink: 0;
  min-width: 48px;
}

.message-line .label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 9px;
  font-weight: 600;
  flex-shrink: 0;
  min-width: 28px;
}

.message-line .label.you {
  color: #0066cc;
}

.message-line .label.ai {
  color: #0044aa;
}

.message-line .text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
  color: #1a1a1a;
  word-break: break-word;
}

.message-separator {
  border: none;
  border-top: 1px solid #f0f0f0;
  margin: 10px 0;
}

/* Typewriter cursor */
.typewriter-cursor {
  display: inline-block;
  width: 6px;
  height: 12px;
  background: #0055cc;
  margin-left: 2px;
  animation: blink-cursor 0.7s step-end infinite;
  vertical-align: text-bottom;
}

@keyframes blink-cursor {
  0%, 100% { opacity: 1; }
  50% { opacity: 0; }
}

/* Input bar */
.input-bar-wrapper {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(calc(-50% - 40px));
  width: 60%;
  max-width: 720px;
  z-index: 10;
}

.input-bar {
  display: flex;
  align-items: center;
  background: #ffffff;
  border: 1px solid #e0e0e0;
  border-radius: 28px;
  padding: 4px 4px 4px 8px;
  box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
  transition: border-color 0.2s, box-shadow 0.2s;
}

.input-bar:focus-within {
  border-color: #c0c0c0;
  box-shadow: 0 2px 12px rgba(0, 0, 0, 0.1);
}

.input-attach {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: 1px solid #e0e0e0;
  background: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  color: #999;
  font-size: 18px;
  transition: background 0.15s;
}

.input-attach:hover {
  background: #f5f5f5;
}

.input-field {
  flex: 1;
  border: none;
  outline: none;
  font-family: 'Inter', sans-serif;
  font-size: 14px;
  padding: 10px 12px;
  background: transparent;
  color: #1a1a1a;
}

.input-field::placeholder {
  color: #b0b0b0;
}

.input-send {
  width: 36px;
  height: 36px;
  border-radius: 50%;
  border: none;
  background: #1a1a1a;
  color: #ffffff;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  flex-shrink: 0;
  transition: background 0.15s, opacity 0.15s;
  opacity: 0.3;
}

.input-send.active {
  opacity: 1;
}

.input-send:hover {
  background: #333333;
}

.input-send svg {
  width: 16px;
  height: 16px;
}

/* Blue sphere */
.sphere-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  width: 120px;
  height: 120px;
  z-index: 20;
}

.sphere {
  width: 120px;
  height: 120px;
  border-radius: 50%;
  background: radial-gradient(circle at 35% 35%, #3388ff, #0055cc 50%, #003399 100%);
  box-shadow: 0 0 30px rgba(0, 100, 255, 0.4), 0 0 60px rgba(0, 100, 255, 0.15);
  position: relative;
  animation: sphere-breathe 3s ease-in-out infinite;
  transition: box-shadow 0.5s ease;
}

.sphere.thinking {
  animation: sphere-pulse 1.2s ease-in-out infinite;
  box-shadow: 0 0 40px rgba(0, 100, 255, 0.55), 0 0 80px rgba(0, 100, 255, 0.25);
}

.sphere.active {
  box-shadow: 0 0 50px rgba(0, 100, 255, 0.7), 0 0 100px rgba(0, 100, 255, 0.3);
}

/* Sphere outer ring */
.sphere-ring {
  position: absolute;
  top: -8px;
  left: -8px;
  width: 136px;
  height: 136px;
  border-radius: 50%;
  border: 1.5px solid rgba(0, 100, 255, 0.2);
  animation: ring-rotate 8s linear infinite;
}

.sphere-ring::before {
  content: '';
  position: absolute;
  top: 0;
  left: 50%;
  width: 6px;
  height: 6px;
  background: rgba(0, 100, 255, 0.5);
  border-radius: 50%;
  transform: translateX(-50%);
}

@keyframes sphere-breathe {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.03); }
}

@keyframes sphere-pulse {
  0%, 100% { transform: scale(1); }
  50% { transform: scale(1.07); }
}

@keyframes ring-rotate {
  0% { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}

/* Welcome */
.welcome-message {
  text-align: center;
  padding: 40px 20px;
  color: #c0c0c0;
  font-family: 'Share Tech Mono', monospace;
  font-size: 11px;
}
</style>
</head>
<body>

<div class="header">
  <h1>V.O.I.C.Y.F.Y</h1>
</div>

<div class="main-area">
  <div class="output-box" id="outputBox">
    <div class="welcome-message">система готова к работе</div>
  </div>
</div>

<div class="input-bar-wrapper">
  <div class="input-bar">
    <button class="input-attach" title="Прикрепить">+</button>
    <input type="text" class="input-field" id="inputField" placeholder="Спросите" autocomplete="off">
    <button class="input-send" id="sendBtn" title="Отправить">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="12" y1="19" x2="12" y2="5"></line>
        <polyline points="5 12 12 5 19 12"></polyline>
      </svg>
    </button>
  </div>
</div>

<div class="sphere-container">
  <div class="sphere" id="sphere">
    <div class="sphere-ring"></div>
  </div>
</div>

<script>
const outputBox = document.getElementById('outputBox');
const inputField = document.getElementById('inputField');
const sendBtn = document.getElementById('sendBtn');
const sphere = document.getElementById('sphere');

const demoResponses = [
  'Анализ завершён. Все системы функционируют в штатном режиме. Обнаружено 3 новых подключения за последний час, параметры в пределах нормы.',
  'Запрос обработан. По данным мониторинга, текущая нагрузка на сервер составляет 42%. Рекомендую провести оптимизацию кэширования для повышения производительности.',
  'Информация получена. В базе знаний найдено 7 релевантных документов. Формирую краткую выжимку по ключевым пунктам вашего запроса.',
  'Задача принята к исполнению. Выполняю сканирование сетевой инфраструктуры. Предварительный отчёт будет готов через несколько секунд.',
  'Понял. Провожу диагностику указанного модуля. Обнаружена незначительная аномалия в логах — рекомендую обратить внимание на конфигурацию маршрутизации.'
];

let responseIndex = 0;
let isTyping = false;

function getTimestamp() {
  const now = new Date();
  return now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
}

function clearWelcome() {
  const welcome = outputBox.querySelector('.welcome-message');
  if (welcome) welcome.remove();
}

function createMessageLine(timestamp, label, labelClass) {
  const line = document.createElement('div');
  line.className = 'message-line';

  const tsSpan = document.createElement('span');
  tsSpan.className = 'timestamp';
  tsSpan.textContent = timestamp;

  const lblSpan = document.createElement('span');
  lblSpan.className = `label ${labelClass}`;
  lblSpan.textContent = label;

  const textSpan = document.createElement('span');
  textSpan.className = 'text';

  line.appendChild(tsSpan);
  line.appendChild(lblSpan);
  line.appendChild(textSpan);

  return { line, textSpan };
}

function addSeparator() {
  const sep = document.createElement('hr');
  sep.className = 'message-separator';
  outputBox.appendChild(sep);
}

function scrollToBottom() {
  outputBox.scrollTop = outputBox.scrollHeight;
}

function typeText(element, text, speed) {
  return new Promise(resolve => {
    const cursor = document.createElement('span');
    cursor.className = 'typewriter-cursor';
    element.appendChild(cursor);

    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        element.insertBefore(document.createTextNode(text[i]), cursor);
        i++;
        scrollToBottom();
      } else {
        clearInterval(interval);
        cursor.remove();
        resolve();
      }
    }, speed);
  });
}

async function sendMessage() {
  const text = inputField.value.trim();
  if (!text || isTyping) return;

  isTyping = true;
  clearWelcome();

  const ts = getTimestamp();

  // User message
  const { line: userLine, textSpan: userText } = createMessageLine(ts, 'YOU', 'you');
  outputBox.appendChild(userLine);
  userText.textContent = text;
  scrollToBottom();

  inputField.value = '';
  updateSendBtn();

  // Thinking state
  sphere.classList.add('thinking');

  // Small delay to simulate thinking
  await new Promise(r => setTimeout(r, 800 + Math.random() * 600));

  sphere.classList.remove('thinking');
  sphere.classList.add('active');

  // Separator
  addSeparator();

  // Bot response
  const response = demoResponses[responseIndex % demoResponses.length];
  responseIndex++;

  const { line: botLine, textSpan: botText } = createMessageLine(ts, 'AI', 'ai');
  outputBox.appendChild(botLine);
  scrollToBottom();

  await typeText(botText, response, 18);

  sphere.classList.remove('active');

  // Separator after exchange
  addSeparator();

  isTyping = false;
}

function updateSendBtn() {
  if (inputField.value.trim().length > 0) {
    sendBtn.classList.add('active');
  } else {
    sendBtn.classList.remove('active');
  }
}

inputField.addEventListener('input', updateSendBtn);

inputField.addEventListener('keydown', (e) => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

sendBtn.addEventListener('click', sendMessage);
</script>
</body>
</html>
