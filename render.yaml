services:
  - type: web
    name: wellcomeai
    env: python
    region: frankfurt  # Выберите регион, наиболее близкий к вашим пользователям
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -k uvicorn.workers.UvicornWorker -w 4 -b 0.0.0.0:$PORT main:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: OPENAI_API_KEY
        sync: false
      - key: JWT_SECRET_KEY
        generateValue: true
      - key: HOST_URL
        fromService:
          type: web
          name: wellcomeai
          envVarKey: RENDER_EXTERNAL_URL
      - key: DATABASE_URL
        fromDatabase:
          name: wellcomeai-db
          property: connectionString
      - key: PRODUCTION
        value: true
      - key: REALTIME_WS_URL
        value: wss://api.openai.com/v1/realtime?model=gpt-4o-realtime-preview-2024-10-01
      - key: CORS_ORIGINS
        value: "*"

databases:
  - name: wellcomeai-db
    region: frankfurt
    plan: free  # Можно изменить на paid, если нужно больше ресурсов

