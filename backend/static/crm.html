<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CRM | Voicyfy</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Основные стили */
    :root {
      --primary-blue: #2563eb;
      --primary-blue-light: #3b82f6;
      --primary-blue-dark: #1d4ed8;
      --text-dark: #0f172a;
      --text-gray: #64748b;
      --text-light: #94a3b8;
      --bg-light: #f8fafc;
      --bg-blue-light: #eff6ff;
      --white: #ffffff;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --radius-md: 0.5rem;
      --radius-lg: 1rem;
      --success-green: #10b981;
      --error-red: #ef4444;
      --warning-yellow: #f59e0b;
      --status-new: #8b5cf6;
      --status-active: #3b82f6;
      --status-client: #10b981;
      --status-archived: #6b7280;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      background-color: var(--bg-light);
      color: var(--text-dark);
      min-height: 100vh;
      display: flex;
    }
    
    /* Боковая панель */
    .sidebar {
      width: 260px;
      background-color: var(--white);
      border-right: 1px solid var(--border-color);
      height: 100vh;
      position: fixed;
      left: 0;
      top: 0;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      z-index: 50;
    }
    
    .sidebar-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-color);
    }
    
    .sidebar-logo {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      font-size: 1.25rem;
      font-weight: 700;
      color: var(--text-dark);
      text-decoration: none;
    }
    
    .logo-icon {
      width: 30px;
      height: 30px;
      border-radius: var(--radius-md);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .logo-icon img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      border-radius: var(--radius-md);
    }
    
    .sidebar-nav {
      padding: 1.5rem 0;
      flex-grow: 1;
    }
    
    .sidebar-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border-color);
    }
    
    .sidebar-nav-item {
      display: flex;
      align-items: center;
      padding: 0.75rem 1.5rem;
      color: var(--text-gray);
      text-decoration: none;
      transition: background-color 0.2s, color 0.2s;
      border-left: 3px solid transparent;
    }
    
    .sidebar-nav-item.active {
      background-color: var(--bg-blue-light);
      color: var(--primary-blue);
      border-left-color: var(--primary-blue);
    }
    
    .sidebar-nav-item:hover {
      background-color: var(--bg-blue-light);
      color: var(--primary-blue);
    }
    
    .sidebar-nav-item i {
      margin-right: 0.75rem;
      width: 20px;
      text-align: center;
    }
    
    .sidebar-section {
      padding: 0 1.5rem;
      margin-bottom: 0.75rem;
      color: var(--text-light);
      font-size: 0.75rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      font-weight: 600;
    }
    
    /* Основной контент */
    .main-content {
      flex: 1;
      margin-left: 260px;
      padding: 0;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }
    
    /* Верхняя панель */
    .top-nav {
      background-color: var(--white);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .page-title {
      font-size: 1.25rem;
      font-weight: 600;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    .page-actions {
      display: flex;
      gap: 1rem;
      align-items: center;
    }
    
    /* Выпадающее меню пользователя */
    .user-menu {
      display: flex;
      align-items: center;
      gap: 1rem;
      position: relative;
    }
    
    .user-button {
      background: none;
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      color: var(--text-dark);
      font-weight: 500;
      padding: 0.5rem 1rem;
      border-radius: var(--radius-md);
      transition: all 0.2s;
    }
    
    .user-button:hover {
      background-color: var(--bg-light);
    }
    
    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background-color: var(--bg-blue-light);
      display: flex;
      justify-content: center;
      align-items: center;
      color: var(--primary-blue);
      font-weight: 600;
    }
    
    .user-dropdown {
      position: absolute;
      top: calc(100% + 0.5rem);
      right: 0;
      background-color: var(--white);
      border-radius: var(--radius-md);
      box-shadow: var(--shadow-md);
      min-width: 180px;
      z-index: 100;
      overflow: hidden;
      display: none;
    }
    
    .user-dropdown.show {
      display: block;
      animation: dropdown-fade 0.2s ease-in-out forwards;
    }
    
    @keyframes dropdown-fade {
      from { opacity: 0; transform: translateY(-10px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .dropdown-item {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.75rem 1rem;
      color: var(--text-gray);
      text-decoration: none;
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    
    .dropdown-item:hover {
      background-color: var(--bg-light);
      color: var(--primary-blue);
    }
    
    .dropdown-divider {
      height: 1px;
      background-color: var(--border-color);
      margin: 0.25rem 0;
    }
    
    .btn {
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius-md);
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      border: none;
    }
    
    .btn-primary {
      background-color: var(--primary-blue);
      color: var(--white);
    }
    
    .btn-primary:hover {
      background-color: var(--primary-blue-dark);
    }
    
    .btn-secondary {
      background-color: var(--bg-light);
      color: var(--text-gray);
      border: 1px solid var(--border-color);
    }
    
    .btn-secondary:hover {
      background-color: var(--border-color);
    }
    
    .btn-success {
      background-color: var(--success-green);
      color: var(--white);
    }
    
    .btn-success:hover {
      background-color: #059669;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Контейнер для содержимого */
    .content-container {
      padding: 2rem;
      flex-grow: 1;
    }
    
    /* Фильтры */
    .filters-bar {
      background-color: var(--white);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 2rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      align-items: flex-end;
    }
    
    .filter-group {
      flex: 1;
      min-width: 200px;
    }
    
    .filter-group label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }
    
    .filter-select, .filter-input {
      width: 100%;
      padding: 0.6rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      background-color: var(--white);
    }
    
    .filter-select {
      cursor: pointer;
    }
    
    .filter-select:focus, .filter-input:focus {
      outline: none;
      border-color: var(--primary-blue-light);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
    }
    
    /* Статусные бейджи */
    .status-filter {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    
    .status-badge {
      padding: 0.5rem 1rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    
    .status-badge.status-all {
      background-color: var(--bg-light);
      color: var(--text-gray);
    }
    
    .status-badge.status-new {
      background-color: rgba(139, 92, 246, 0.1);
      color: var(--status-new);
    }
    
    .status-badge.status-active {
      background-color: rgba(59, 130, 246, 0.1);
      color: var(--status-active);
    }
    
    .status-badge.status-client {
      background-color: rgba(16, 185, 129, 0.1);
      color: var(--status-client);
    }
    
    .status-badge.status-archived {
      background-color: rgba(107, 114, 128, 0.1);
      color: var(--status-archived);
    }
    
    .status-badge.active {
      border-color: currentColor;
      font-weight: 600;
    }
    
    .status-badge:hover {
      transform: translateY(-2px);
    }
    
    /* Grid карточек */
    .contacts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
      gap: 1.5rem;
      margin-bottom: 2rem;
    }
    
    .contact-card {
      background-color: var(--white);
      border-radius: var(--radius-lg);
      border: 1px solid var(--border-color);
      padding: 1.5rem;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: var(--shadow-sm);
      position: relative;
    }
    
    .contact-card:hover {
      box-shadow: var(--shadow-md);
      border-color: var(--primary-blue-light);
      transform: translateY(-2px);
    }
    
    .card-header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 1rem;
    }
    
    .contact-avatar {
      width: 48px;
      height: 48px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-blue-light), var(--primary-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 1.25rem;
      font-weight: 600;
      flex-shrink: 0;
    }
    
    .card-info {
      flex: 1;
      min-width: 0;
    }
    
    .contact-name {
      font-weight: 600;
      font-size: 0.95rem;
      margin-bottom: 0.25rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    
    .contact-phone {
      font-size: 0.85rem;
      color: var(--text-light);
      font-family: 'Consolas', 'Monaco', monospace;
    }
    
    .card-status {
      position: absolute;
      top: 1rem;
      right: 1rem;
      padding: 0.25rem 0.75rem;
      border-radius: 1rem;
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }
    
    .card-status.new {
      background-color: rgba(139, 92, 246, 0.1);
      color: var(--status-new);
    }
    
    .card-status.active {
      background-color: rgba(59, 130, 246, 0.1);
      color: var(--status-active);
    }
    
    .card-status.client {
      background-color: rgba(16, 185, 129, 0.1);
      color: var(--status-client);
    }
    
    .card-status.archived {
      background-color: rgba(107, 114, 128, 0.1);
      color: var(--status-archived);
    }
    
    .card-notes {
      font-size: 0.875rem;
      color: var(--text-gray);
      line-height: 1.5;
      margin-bottom: 1rem;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    
    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 1rem;
      border-top: 1px solid var(--border-color);
      font-size: 0.8rem;
      color: var(--text-light);
    }
    
    .card-meta {
      display: flex;
      gap: 1rem;
    }
    
    .meta-item {
      display: flex;
      align-items: center;
      gap: 0.35rem;
    }
    
    /* Пустое состояние */
    .empty-state {
      text-align: center;
      padding: 4rem 2rem;
      background-color: var(--white);
      border-radius: var(--radius-lg);
      border: 2px dashed var(--border-color);
    }
    
    .empty-state i {
      font-size: 4rem;
      color: var(--text-light);
      margin-bottom: 1.5rem;
    }
    
    .empty-state h3 {
      font-size: 1.25rem;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }
    
    .empty-state p {
      color: var(--text-gray);
      margin-bottom: 1.5rem;
    }
    
    /* Пагинация */
    .pagination {
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 0.5rem;
      margin-top: 2rem;
    }
    
    .pagination-btn {
      padding: 0.5rem 1rem;
      border: 1px solid var(--border-color);
      background-color: var(--white);
      border-radius: var(--radius-md);
      cursor: pointer;
      font-size: 0.875rem;
      transition: all 0.2s;
    }
    
    .pagination-btn:hover:not(:disabled) {
      background-color: var(--bg-blue-light);
      border-color: var(--primary-blue-light);
      color: var(--primary-blue);
    }
    
    .pagination-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .pagination-info {
      padding: 0 1rem;
      font-size: 0.875rem;
      color: var(--text-gray);
    }
    
    /* Модальное окно */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      animation: fade-in 0.2s ease;
    }
    
    .modal-overlay.show {
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 2rem;
    }
    
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    .modal {
      background-color: var(--white);
      border-radius: var(--radius-lg);
      max-width: 900px;
      width: 100%;
      max-height: 90vh;
      display: flex;
      flex-direction: column;
      box-shadow: var(--shadow-lg);
      animation: slide-up 0.3s ease;
    }
    
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .modal-header {
      padding: 1.5rem;
      border-bottom: 1px solid var(--border-color);
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      flex-shrink: 0;
    }
    
    .modal-header-content {
      flex: 1;
    }
    
    .modal-title {
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }
    
    .modal-subtitle {
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
      margin-top: 0.75rem;
      align-items: center;
    }
    
    .modal-close {
      background: none;
      border: none;
      font-size: 1.5rem;
      color: var(--text-gray);
      cursor: pointer;
      width: 32px;
      height: 32px;
      display: flex;
      align-items: center;
      justify-content: center;
      border-radius: var(--radius-md);
      transition: all 0.2s;
      flex-shrink: 0;
    }
    
    .modal-close:hover {
      background-color: var(--bg-light);
      color: var(--text-dark);
    }
    
    .modal-body {
      flex: 1;
      overflow-y: auto;
      padding: 1.5rem;
    }
    
    .modal-section {
      margin-bottom: 2rem;
    }
    
    .section-title {
      font-size: 0.875rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-light);
      margin-bottom: 1rem;
    }
    
    .form-group {
      margin-bottom: 1.5rem;
    }
    
    .form-label {
      display: block;
      font-size: 0.875rem;
      font-weight: 500;
      margin-bottom: 0.5rem;
      color: var(--text-dark);
    }
    
    .form-input, .form-textarea {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-family: inherit;
    }
    
    .form-textarea {
      resize: vertical;
      min-height: 100px;
    }
    
    .form-input:focus, .form-textarea:focus {
      outline: none;
      border-color: var(--primary-blue-light);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
    }
    
    .status-selector {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
    }
    
    .status-option {
      padding: 0.5rem 1rem;
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }
    
    .status-option:hover {
      transform: translateY(-2px);
    }
    
    .status-option.selected {
      border-color: currentColor;
      font-weight: 600;
    }
    
    /* История диалогов */
    .conversations-list {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .conversation-item {
      background-color: var(--bg-light);
      border-radius: var(--radius-md);
      padding: 1rem;
      cursor: pointer;
      transition: all 0.2s;
      border: 1px solid var(--border-color);
    }
    
    .conversation-item:hover {
      background-color: var(--white);
      box-shadow: var(--shadow-sm);
    }
    
    .conversation-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    
    .conversation-assistant {
      font-weight: 600;
      font-size: 0.9rem;
    }
    
    .conversation-date {
      font-size: 0.75rem;
      color: var(--text-light);
    }
    
    .conversation-stats {
      display: flex;
      gap: 1rem;
      font-size: 0.75rem;
      color: var(--text-gray);
    }
    
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--border-color);
      background-color: var(--bg-light);
      flex-shrink: 0;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .modal-actions {
      display: flex;
      gap: 0.75rem;
    }
    
    /* Уведомление */
    .notification {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background-color: var(--white);
      border-radius: var(--radius-md);
      padding: 1rem;
      box-shadow: var(--shadow-md);
      max-width: 350px;
      z-index: 1000;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      transition: transform 0.3s, opacity 0.3s;
      transform: translateY(-20px);
      opacity: 0;
    }
    
    .notification.show {
      transform: translateY(0);
      opacity: 1;
    }
    
    .notification-success {
      border-left: 4px solid var(--success-green);
    }
    
    .notification-error {
      border-left: 4px solid var(--error-red);
    }
    
    .notification-info {
      border-left: 4px solid var(--primary-blue);
    }
    
    .notification-icon {
      font-size: 1.25rem;
    }
    
    .notification-success .notification-icon {
      color: var(--success-green);
    }
    
    .notification-error .notification-icon {
      color: var(--error-red);
    }
    
    .notification-info .notification-icon {
      color: var(--primary-blue);
    }
    
    .notification-content {
      flex: 1;
    }
    
    .notification-close {
      background: none;
      border: none;
      color: var(--text-gray);
      cursor: pointer;
      font-size: 1.125rem;
    }
    
    /* Состояние загрузки */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.8);
      display: flex;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }

    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid var(--bg-blue-light);
      border-radius: 50%;
      border-top-color: var(--primary-blue);
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Мобильная адаптация */
    @media (max-width: 768px) {
