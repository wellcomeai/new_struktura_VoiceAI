<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Контакт | Voicyfy CRM</title>
  <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
  <link rel="apple-touch-icon" sizes="180x180" href="/static/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/static/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/static/favicon-16x16.png">
  <link rel="manifest" href="/static/manifest.json">
  <meta name="theme-color" content="#2563eb">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* Переменные */
    :root {
      --primary-blue: #2563eb;
      --primary-blue-light: #3b82f6;
      --primary-blue-dark: #1d4ed8;
      --text-dark: #0f172a;
      --text-gray: #64748b;
      --text-light: #94a3b8;
      --bg-light: #f8fafc;
      --bg-blue-light: #eff6ff;
      --white: #ffffff;
      --border-color: #e2e8f0;
      --shadow-sm: 0 1px 2px 0 rgba(0, 0, 0, 0.05);
      --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
      --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
      --radius-md: 0.5rem;
      --radius-lg: 1rem;
      --success-green: #10b981;
      --error-red: #ef4444;
      --warning-yellow: #f59e0b;
      --status-new: #8b5cf6;
      --status-active: #3b82f6;
      --status-client: #10b981;
      --status-archived: #6b7280;
    }
    
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }
    
    body {
      background-color: var(--bg-light);
      color: var(--text-dark);
      min-height: 100vh;
    }
    
    /* Header */
    .header {
      background-color: var(--white);
      border-bottom: 1px solid var(--border-color);
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }
    
    .header-left {
      display: flex;
      align-items: center;
      gap: 1rem;
    }
    
    .back-btn {
      background: none;
      border: none;
      color: var(--text-gray);
      cursor: pointer;
      font-size: 1.25rem;
      padding: 0.5rem;
      border-radius: var(--radius-md);
      transition: all 0.2s;
    }
    
    .back-btn:hover {
      background-color: var(--bg-light);
      color: var(--primary-blue);
    }
    
    .header-title {
      font-size: 1.25rem;
      font-weight: 600;
      color: var(--text-dark);
    }
    
    .header-actions {
      display: flex;
      gap: 0.75rem;
    }
    
    /* Main Layout */
    .main-layout {
      display: grid;
      grid-template-columns: 350px 1fr;
      gap: 0;
      height: calc(100vh - 73px);
    }
    
    /* Left Panel */
    .left-panel {
      background-color: var(--white);
      border-right: 1px solid var(--border-color);
      padding: 2rem;
      overflow-y: auto;
    }
    
    .contact-avatar-large {
      width: 120px;
      height: 120px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--primary-blue-light), var(--primary-blue));
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--white);
      font-size: 3rem;
      font-weight: 600;
      margin: 0 auto 1.5rem;
    }
    
    .contact-name {
      text-align: center;
      font-size: 1.5rem;
      font-weight: 600;
      margin-bottom: 0.5rem;
    }
    
    .contact-phone {
      text-align: center;
      font-size: 1rem;
      color: var(--text-gray);
      font-family: 'Consolas', 'Monaco', monospace;
      margin-bottom: 2rem;
    }
    
    .info-section {
      margin-bottom: 2rem;
    }
    
    .section-label {
      font-size: 0.75rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-light);
      margin-bottom: 0.75rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    
    .status-dropdown {
      width: 100%;
      padding: 0.75rem 1rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-weight: 500;
      cursor: pointer;
      background-color: var(--white);
      transition: all 0.2s;
    }
    
    .status-dropdown:focus {
      outline: none;
      border-color: var(--primary-blue-light);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
    }
    
    /* Notes Feed */
    .notes-feed {
      display: flex;
      flex-direction: column;
      gap: 0.75rem;
      max-height: 400px;
      overflow-y: auto;
      padding-right: 0.5rem;
    }
    
    .notes-feed::-webkit-scrollbar {
      width: 6px;
    }
    
    .notes-feed::-webkit-scrollbar-track {
      background: var(--bg-light);
      border-radius: 3px;
    }
    
    .notes-feed::-webkit-scrollbar-thumb {
      background: var(--border-color);
      border-radius: 3px;
    }
    
    .notes-feed::-webkit-scrollbar-thumb:hover {
      background: var(--text-light);
    }
    
    .note-card {
      background-color: var(--bg-light);
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      padding: 0.75rem;
      position: relative;
      transition: all 0.2s;
    }
    
    .note-card:hover {
      box-shadow: var(--shadow-sm);
      border-color: var(--primary-blue-light);
    }
    
    .note-card-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    
    .note-date {
      font-size: 0.75rem;
      color: var(--text-light);
    }
    
    .note-delete-btn {
      background: none;
      border: none;
      color: var(--text-light);
      cursor: pointer;
      padding: 0.25rem;
      border-radius: 0.25rem;
      transition: all 0.2s;
      font-size: 0.875rem;
    }
    
    .note-delete-btn:hover {
      color: var(--error-red);
      background-color: rgba(239, 68, 68, 0.1);
    }
    
    .note-text {
      font-size: 0.875rem;
      line-height: 1.5;
      color: var(--text-dark);
      word-wrap: break-word;
    }
    
    .note-input-container {
      margin-top: 0.75rem;
    }
    
    .note-input {
      width: 100%;
      min-height: 80px;
      padding: 0.75rem;
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      font-size: 0.875rem;
      font-family: inherit;
      resize: vertical;
      transition: all 0.2s;
    }
    
    .note-input:focus {
      outline: none;
      border-color: var(--primary-blue-light);
      box-shadow: 0 0 0 2px rgba(59, 130, 246, 0.25);
    }
    
    .note-input::placeholder {
      color: var(--text-light);
    }
    
    .add-note-btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.6rem 1rem;
      background-color: var(--primary-blue);
      color: var(--white);
      border: none;
      border-radius: var(--radius-md);
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    
    .add-note-btn:hover {
      background-color: var(--primary-blue-dark);
    }
    
    .add-note-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    .notes-empty {
      text-align: center;
      padding: 2rem 1rem;
      color: var(--text-light);
      font-size: 0.875rem;
    }
    
    .notes-empty i {
      font-size: 2rem;
      margin-bottom: 0.5rem;
      display: block;
    }
    
    .btn {
      padding: 0.6rem 1.25rem;
      border-radius: var(--radius-md);
      font-weight: 500;
      font-size: 0.875rem;
      cursor: pointer;
      transition: all 0.2s;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      border: none;
      width: 100%;
    }
    
    .btn-primary {
      background-color: var(--primary-blue);
      color: var(--white);
    }
    
    .btn-primary:hover {
      background-color: var(--primary-blue-dark);
    }
    
    .btn-danger {
      background-color: var(--error-red);
      color: var(--white);
      margin-top: 1rem;
    }
    
    .btn-danger:hover {
      background-color: #dc2626;
    }
    
    .btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }
    
    /* Right Panel */
    .right-panel {
      background-color: var(--bg-light);
      padding: 2rem;
      overflow-y: auto;
    }
    
    .panel-section {
      background-color: var(--white);
      border-radius: var(--radius-lg);
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border-color);
    }
    
    .panel-section-title {
      font-size: 1.125rem;
      font-weight: 600;
      margin-bottom: 1.5rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    
    /* Conversations Accordion */
    .conversation-accordion {
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }
    
    .conversation-item {
      border: 1px solid var(--border-color);
      border-radius: var(--radius-md);
      overflow: hidden;
      transition: all 0.2s;
    }
    
    .conversation-item:hover {
      box-shadow: var(--shadow-sm);
    }
    
    .conversation-header {
      padding: 1rem;
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background-color: var(--bg-light);
      transition: all 0.2s;
    }
    
    .conversation-header:hover {
      background-color: var(--bg-blue-light);
    }
    
    .conversation-info {
      flex: 1;
    }
    
    .conversation-date {
      font-size: 0.875rem;
      font-weight: 600;
      color: var(--text-dark);
      margin-bottom: 0.25rem;
    }
    
    .conversation-meta {
      font-size: 0.75rem;
      color: var(--text-gray);
      display: flex;
      gap: 1rem;
      flex-wrap: wrap;
    }
    
    .conversation-toggle {
      color: var(--text-gray);
      font-size: 1.25rem;
      transition: transform 0.2s;
    }
    
    .conversation-item.expanded .conversation-toggle {
      transform: rotate(180deg);
    }
    
    .conversation-body {
      padding: 0;
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease-out;
    }
    
    .conversation-item.expanded .conversation-body {
      max-height: 2000px;
      transition: max-height 0.5s ease-in;
    }
    
    .conversation-messages {
      padding: 1rem;
      background-color: var(--white);
    }
    
    .message {
      margin-bottom: 1rem;
      padding: 0.75rem 1rem;
      border-radius: var(--radius-md);
      max-width: 85%;
    }
    
    .message-user {
      background-color: var(--bg-blue-light);
      margin-left: auto;
      text-align: right;
    }
    
    .message-assistant {
      background-color: var(--bg-light);
      margin-right: auto;
    }
    
    .message-role {
      font-size: 0.75rem;
      font-weight: 600;
      color: var(--text-gray);
      margin-bottom: 0.25rem;
    }
    
    .message-text {
      font-size: 0.875rem;
      line-height: 1.5;
      color: var(--text-dark);
    }
    
    .empty-state {
      text-align: center;
      padding: 3rem 1rem;
      color: var(--text-gray);
    }
    
    .empty-state i {
      font-size: 3rem;
      color: var(--text-light);
      margin-bottom: 1rem;
    }
    
    /* Modal */
    .modal-overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(0, 0, 0, 0.6);
      z-index: 1000;
      animation: fade-in 0.2s ease;
      align-items: center;
      justify-content: center;
    }
    
    .modal-overlay.show {
      display: flex;
    }
    
    .modal {
      background-color: var(--white);
      border-radius: var(--radius-lg);
      max-width: 400px;
      width: 90%;
      padding: 2rem;
      box-shadow: var(--shadow-lg);
      animation: slide-up 0.3s ease;
    }
    
    @keyframes fade-in {
      from { opacity: 0; }
      to { opacity: 1; }
    }
    
    @keyframes slide-up {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }
    
    .modal-icon {
      font-size: 3rem;
      text-align: center;
      margin-bottom: 1rem;
    }
    
    .modal-icon.warning {
      color: var(--warning-yellow);
    }
    
    .modal-title {
      font-size: 1.25rem;
      font-weight: 600;
      text-align: center;
      margin-bottom: 0.5rem;
    }
    
    .modal-text {
      text-align: center;
      color: var(--text-gray);
      margin-bottom: 1.5rem;
      line-height: 1.5;
    }
    
    .modal-actions {
      display: flex;
      gap: 0.75rem;
    }
    
    .modal-actions .btn {
      width: auto;
      flex: 1;
    }
    
    /* Notification */
    .notification {
      position: fixed;
      top: 1rem;
      right: 1rem;
      background-color: var(--white);
      border-radius: var(--radius-md);
      padding: 1rem;
      box-shadow: var(--shadow-md);
      max-width: 350px;
      z-index: 1000;
      display: none;
      align-items: center;
      gap: 0.75rem;
      transition: transform 0.3s, opacity 0.3s;
      transform: translateY(-20px);
      opacity: 0;
    }
    
    .notification.show {
      display: flex;
      transform: translateY(0);
      opacity: 1;
    }
    
    .notification-success {
      border-left: 4px solid var(--success-green);
    }
    
    .notification-error {
      border-left: 4px solid var(--error-red);
    }
    
    .notification-icon {
      font-size: 1.25rem;
    }
    
    .notification-success .notification-icon {
      color: var(--success-green);
    }
    
    .notification-error .notification-icon {
      color: var(--error-red);
    }
    
    .notification-content {
      flex: 1;
    }
    
    .notification-close {
      background: none;
      border: none;
      color: var(--text-gray);
      cursor: pointer;
      font-size: 1.125rem;
    }
    
    /* Loading */
    .loading-overlay {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background-color: rgba(255, 255, 255, 0.8);
      display: none;
      justify-content: center;
      align-items: center;
      z-index: 1000;
    }
    
    .loading-overlay.show {
      display: flex;
    }
    
    .loading-spinner {
      width: 50px;
      height: 50px;
      border: 5px solid var(--bg-blue-light);
      border-radius: 50%;
      border-top-color: var(--primary-blue);
      animation: spin 1s linear infinite;
    }
    
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    
    /* Mobile */
    @media (max-width: 768px) {
      .main-layout {
        grid-template-columns: 1fr;
        height: auto;
      }
      
      .left-panel {
        border-right: none;
        border-bottom: 1px solid var(--border-color);
      }
      
      .header {
        padding: 1rem;
      }
      
      .right-panel {
        padding: 1rem;
      }
    }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="header-left">
      <button class="back-btn" onclick="window.location.href='/static/crm.html'">
        <i class="fas fa-arrow-left"></i>
      </button>
      <h1 class="header-title">Детали контакта</h1>
    </div>
    <div class="header-actions">
      <button class="btn btn-danger" id="delete-contact-btn" style="width: auto;">
        <i class="fas fa-trash"></i> Удалить
      </button>
    </div>
  </div>
  
  <!-- Main Layout -->
  <div class="main-layout">
    <!-- Left Panel -->
    <div class="left-panel">
      <div class="contact-avatar-large" id="contact-avatar">АА</div>
      <div class="contact-name" id="contact-name">Загрузка...</div>
      <div class="contact-phone" id="contact-phone">+7 ...</div>
      
      <!-- Status -->
      <div class="info-section">
        <div class="section-label">Статус</div>
        <select class="status-dropdown" id="status-dropdown">
          <option value="new">🆕 Новый</option>
          <option value="active">⚡ Активный</option>
          <option value="client">✅ Клиент</option>
          <option value="archived">📦 Архив</option>
        </select>
      </div>
      
      <!-- Notes Feed -->
      <div class="info-section">
        <div class="section-label">
          <span>Заметки (<span id="notes-count">0</span>)</span>
        </div>
        
        <!-- Notes List -->
        <div class="notes-feed" id="notes-feed">
          <!-- Notes will be loaded here -->
        </div>
        
        <!-- Add Note Form -->
        <div class="note-input-container">
          <textarea 
            class="note-input" 
            id="note-input" 
            placeholder="Добавьте новую заметку..."
            rows="3"
          ></textarea>
          <button class="add-note-btn" id="add-note-btn">
            <i class="fas fa-plus"></i> Добавить заметку
          </button>
        </div>
      </div>
    </div>
    
    <!-- Right Panel -->
    <div class="right-panel">
      <!-- Conversations History -->
      <div class="panel-section">
        <div class="panel-section-title">
          <i class="fas fa-comments"></i>
          История диалогов (<span id="conversations-count">0</span>)
        </div>
        <div class="conversation-accordion" id="conversations-accordion">
          <!-- Conversations will be loaded here -->
        </div>
      </div>
    </div>
  </div>
  
  <!-- Delete Confirmation Modal -->
  <div class="modal-overlay" id="delete-modal">
    <div class="modal">
      <div class="modal-icon warning">
        <i class="fas fa-exclamation-triangle"></i>
      </div>
      <h2 class="modal-title">Удалить контакт?</h2>
      <p class="modal-text">
        Это также удалит все связанные диалоги (<span id="delete-conversations-count">0</span> шт.)
        <br><br>
        <strong>Это действие нельзя отменить.</strong>
      </p>
      <div class="modal-actions">
        <button class="btn btn-primary" id="cancel-delete-btn">Отмена</button>
        <button class="btn btn-danger" id="confirm-delete-btn">Удалить</button>
      </div>
    </div>
  </div>
  
  <!-- Notification -->
  <div class="notification notification-success" id="notification">
    <div class="notification-icon">
      <i class="fas fa-check-circle"></i>
    </div>
    <div class="notification-content">
      <div id="notification-message">Успешно!</div>
    </div>
    <button class="notification-close" id="notification-close">&times;</button>
  </div>
  
  <!-- Loading Overlay -->
  <div class="loading-overlay" id="loading-overlay">
    <div class="loading-spinner"></div>
  </div>
  
  <script src="/static/js/crm-contact.js"></script>
</body>
</html>
